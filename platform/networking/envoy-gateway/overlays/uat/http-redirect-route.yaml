apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admancorp-envoy-http-redirect
  namespace: networking
spec:
  parentRefs:
    - name: admancorp-envoy
      sectionName: http-root
    - name: admancorp-envoy
      sectionName: http-apps
  hostnames:
    - uat.admancorp.com
    - '*.uat.admancorp.com'
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
