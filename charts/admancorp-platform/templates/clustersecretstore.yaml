{{- if .Values.clusterSecretStore.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: platform
spec:
  provider:
    {{- if eq .Values.cloud "azure" }}
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://admancorp-kv-{{ .Values.environment }}.vault.azure.net
      serviceAccountRef:
        name: external-secrets
        namespace: argocd
    {{- else if eq .Values.cloud "gcp" }}
    gcpsm:
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: external-secrets
            namespace: argocd
    {{- end }}
{{- end }}
