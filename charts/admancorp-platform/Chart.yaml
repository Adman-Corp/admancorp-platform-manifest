apiVersion: v2
name: admancorp-platform
description: Umbrella chart composing all AdmanCorp platform components
type: application
version: 1.0.0

dependencies:
  - name: namespaces
    version: "1.0.0"
    repository: file://../namespaces
  - name: envoy-gateway
    version: "1.0.0"
    repository: file://../envoy-gateway
  - name: external-secrets
    version: "0.14.4"
    repository: https://charts.external-secrets.io
  - name: kyverno
    version: "3.3.9"
    repository: https://kyverno.github.io/kyverno
  - name: kube-prometheus-stack
    version: "69.8.2"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: loki
    version: "6.28.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: alloy
    version: "0.12.6"
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled
