apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admancorp-envoy-apps-wildcard
  namespace: networking
spec:
  secretName: admancorp-envoy-apps-wildcard-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  dnsNames:
    - {{ .Values.domain }}
    - '*.{{ .Values.domain }}'
