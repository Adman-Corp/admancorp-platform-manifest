apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

patches:
  - target:
      group: gateway.envoyproxy.io
      version: v1alpha1
      kind: EnvoyProxy
      name: admancorp-envoy-proxy
      namespace: networking
    patch: |-
      - op: replace
        path: /spec/provider/kubernetes/envoyService/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: gcp-gw.dev.admancorp.com
