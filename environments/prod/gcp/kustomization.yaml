apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../shared
  - ../../../platform/operators/cert-manager/overlays/prod
  - ../../../platform/operators/external-secrets/overlays/prod
  - ../../../platform/networking/gateway-api/overlays/prod
  - ../../../platform/networking/envoy-gateway/overlays/prod
  - ../../../platform/observability/kube-prometheus-stack/overlays/prod
  - ../../../platform/observability/loki/overlays/prod
  - ../../../platform/security/kyverno/overlays/prod

patches:
  - target:
      group: gateway.envoyproxy.io
      version: v1alpha1
      kind: EnvoyProxy
      name: admancorp-envoy-proxy
      namespace: networking
    patch: |-
      - op: replace
        path: /spec/provider/kubernetes/envoyService/annotations/external-dns.alpha.kubernetes.io~1hostname
        value: gcp-gw.admancorp.com
